<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSC</title>
<style>
/* ═══════════════════════════════════════════
   MSC — Model Steer Claude
   Anthropic-inspired warm light theme
   ═══════════════════════════════════════════ */

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  /* Colors */
  --bg: #faf9f7;
  --surface: #ffffff;
  --border: #e8e5df;
  --border-hover: #d4cfc8;
  --text-primary: #1a1a17;
  --text-secondary: #6b6560;
  --text-tertiary: #9b9590;
  --accent: #c96442;
  --accent-light: #fdf0eb;
  --accent-dark: #a84e30;
  --success: #2d8a56;
  --success-bg: #ecf7f0;
  --destructive: #d04040;
  --destructive-bg: #fdeaea;

  /* Typography */
  --font-sans: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', monospace;

  /* Effects */
  --radius-card: 12px;
  --radius-input: 8px;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.05);
  --shadow-elevated: 0 6px 24px rgba(0, 0, 0, 0.1);
  --transition: 180ms ease;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══ Interactive hover transition ═══ */
a, button, .sidebar-item, .chip, .type-option, .color-dot, .cot-project-item, .cot-session-item, tr {
  transition: all 180ms ease;
}

/* ═══ Layout ═══ */
.app {
  display: flex;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  max-width: none;
}

/* ═══ Sidebar ═══ */
.sidebar {
  width: 64px;
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  flex-shrink: 0;
}
.sidebar-logo {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.5px;
  margin-bottom: 24px;
  writing-mode: horizontal-tb;
}
.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
  padding: 0 8px;
}
.sidebar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 4px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-tertiary);
  font-size: 9px;
  font-weight: 500;
  text-align: center;
  transition: all 180ms ease;
  user-select: none;
}
.sidebar-item:hover {
  background: var(--bg);
  color: var(--text-secondary);
}
.sidebar-item.active {
  background: var(--accent-light);
  color: var(--accent);
}
.sidebar-icon {
  width: 20px;
  height: 20px;
}
.main-content {
  flex: 1;
  min-width: 0;
  padding: 24px 32px;
  overflow-y: auto;
  max-height: 100vh;
}

.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

/* ═══ Cards ═══ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow);
}

/* ═══ Section ═══ */
.section {
  margin-bottom: 24px;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
}
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

/* ═══ Buttons ═══ */
.btn {
  padding: 8px 16px;
  border-radius: var(--radius-input);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-sans);
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover {
  background: var(--accent-dark);
  border-color: var(--accent-dark);
}
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border);
}
.btn-ghost:hover {
  background: var(--bg);
  border-color: var(--border-hover);
}
.btn-small {
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 6px;
}
.btn-icon {
  width: 28px;
  height: 28px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  color: var(--text-tertiary);
  font-size: 13px;
  transition: all var(--transition);
  font-family: var(--font-sans);
}
.btn-icon:hover {
  background: var(--bg);
  color: var(--text-primary);
  border-color: var(--border-hover);
}
.btn-icon.btn-destructive:hover {
  background: var(--destructive-bg);
  color: var(--destructive);
  border-color: var(--destructive);
}
.btn-icon.btn-promote:hover {
  background: var(--success-bg);
  color: var(--success);
  border-color: var(--success);
}

/* ═══ Model Items (Sorted / Priority) ═══ */
.model-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.model-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  cursor: grab;
  transition: all var(--transition);
  user-select: none;
}
.model-item:hover {
  border-color: var(--border-hover);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
}
.model-item:active {
  cursor: grabbing;
}
.model-item.dragging {
  opacity: 0.35;
  border-style: dashed;
}
.model-item.drag-over, .pool-item.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.model-list.drop-target, .pool-list.drop-target {
  outline: 2px dashed var(--accent);
  outline-offset: 4px;
  border-radius: var(--radius-card);
}
.pool-item {
  cursor: grab;
}
.pool-item:active {
  cursor: grabbing;
}
.pool-item.dragging {
  opacity: 0.3;
  border-style: dashed;
}
.model-grip {
  color: var(--text-tertiary);
  font-size: 14px;
  cursor: grab;
  flex-shrink: 0;
  line-height: 1;
}
.model-rank {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--accent-light);
  color: var(--accent);
}
.model-body {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.model-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.model-meta {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.provider-tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.model-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

/* ═══ Pool Items (Unsorted) ═══ */
.pool-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* ═══ Level Pool Container ═══ */
.level-pool {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  margin: 8px 12px;
  padding: 12px;
  transition: border-color var(--transition);
}
.level-pool:hover {
  border-color: var(--border-hover);
}
.level-pool.drag-over-pool {
  border-color: var(--accent);
  background: var(--accent-light);
}
.level-pool-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}
.level-pool-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.level-pool-providers {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 60px;
  padding: 4px 0;
}
.level-pool-providers.drop-target {
  outline: 2px dashed var(--accent);
  outline-offset: 2px;
  border-radius: 8px;
  background: var(--accent-light);
}
.level-pool-footer {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}

/* Provider Card */
.provider-card {
  width: 180px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: grab;
  transition: all var(--transition);
  position: relative;
}
.provider-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}
.provider-card.dragging {
  opacity: 0.35;
}
.provider-card .provider-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.provider-card .provider-health {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.provider-card .health-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.provider-card .health-dot.ok { background: var(--success); }
.provider-card .health-dot.fail { background: var(--destructive); }
.provider-card .health-dot.unknown { background: var(--text-tertiary); }

/* Role Chips */
.role-chip {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.3px;
}
.role-chip.primary {
  background: var(--accent-light);
  color: var(--accent-dark);
}
.role-chip.backup {
  background: var(--bg);
  color: var(--text-tertiary);
  border: 1px solid var(--border);
}
.pool-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-input);
  transition: all var(--transition);
}
.pool-item:hover {
  border-color: var(--border-hover);
}
.pool-item .model-body {
  flex: 1;
}
.pool-item .model-name {
  font-size: 12px;
}
.pool-item .model-meta {
  font-size: 10px;
}
.alias-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-light);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.pool-empty {
  text-align: center;
  padding: 24px;
  color: var(--text-tertiary);
  font-size: 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-input);
}

/* ═══ Action Bar ═══ */
.action-bar {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}

/* ═══ Modal ═══ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(2px);
  z-index: 50;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 90px;
}
.overlay.show {
  display: flex;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-elevated);
  width: 580px;
  max-width: 92vw;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  animation: modalIn 200ms ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: none; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 {
  font-size: 15px;
  font-weight: 600;
}
.modal-body {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}
.modal-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ═══ Form ═══ */
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input,
.field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-input);
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition);
}
.field input:focus,
.field select:focus {
  border-color: var(--accent);
}
.field input::placeholder {
  color: var(--text-tertiary);
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* Type selector */
.type-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.type-option {
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-input);
  cursor: pointer;
  text-align: center;
  transition: all 150ms ease;
}
.type-option:hover {
  border-color: var(--border-hover);
}
.type-option.active {
  border-color: var(--accent);
  background: var(--accent-light);
}
.type-option-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
}
.type-option-desc {
  font-size: 11px;
  color: var(--text-secondary);
}

/* Preset chips */
.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.chip {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 150ms ease;
  background: var(--surface);
  color: var(--text-secondary);
  font-family: var(--font-sans);
}
.chip:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Checkbox row */
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 10px;
}
.checkbox-row input[type="checkbox"] {
  width: auto;
  cursor: pointer;
  accent-color: var(--accent);
}

/* Color picker */
.color-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.color-dot {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 150ms ease;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
}
.color-dot:hover {
  transform: scale(1.15);
}
.color-dot.selected {
  border-color: var(--text-primary);
  box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--text-tertiary);
}

/* Read-only rank field in modal */
.field input.readonly-rank {
  background: var(--bg);
  color: var(--text-secondary);
  text-align: center;
  font-weight: 700;
  font-size: 16px;
}

/* ═══ Usage Tab ═══ */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  padding: 16px;
  text-align: center;
}
.stat-value {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.stat-value.green {
  color: var(--success);
}
.stat-label {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 3px;
}

/* Table */
.table-wrapper {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.3px;
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td {
  border-bottom: none;
}
tr:hover td {
  background: var(--bg);
}
.session-id {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
}
.model-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  background: var(--accent-light);
  color: var(--accent);
}
.session-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.field-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-input);
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition);
}
.field-input:focus {
  border-color: var(--accent);
}
.field-input::placeholder {
  color: var(--text-tertiary);
}
.usage-bar {
  height: 6px;
  border-radius: 3px;
  background: var(--bg);
  overflow: hidden;
  min-width: 100px;
  display: flex;
}
.usage-bar div {
  height: 100%;
}
/* bar segments now get inline background colors from JS */
.saved-text {
  color: var(--success);
  font-weight: 600;
}
.legend {
  display: flex;
  gap: 14px;
  margin-top: 8px;
  padding: 0 4px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-secondary);
}
.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ═══ Empty state ═══ */
.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: var(--text-tertiary);
  font-size: 13px;
}
.empty-state-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

/* ═══ Toast ═══ */
.toast {
  position: fixed;
  top: 16px;
  right: 16px;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-elevated);
  opacity: 0;
  transform: translateY(-8px);
  transition: all 200ms ease;
  z-index: 100;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: none;
}
.toast.success {
  border-color: var(--success);
  color: var(--success);
}
.toast.error {
  border-color: var(--destructive);
  color: var(--destructive);
}

/* CoT tab: same width as other tabs (no breakout) */

/* ═══ CoT Viewer — Two Column + Fullscreen ═══ */
.cot-layout {
  display: flex;
  height: 100vh;
  min-height: 500px;
  border: none;
  overflow: hidden;
  background: #ffffff;
}
.cot-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cot-panel-projects {
  width: 35%;
  min-width: 200px;
  border-right: 1px solid var(--border);
}
.cot-panel-sessions {
  width: 65%;
  min-width: 240px;
}
.cot-panel-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cot-search {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-input);
  font-size: 12px;
  font-family: var(--font-sans);
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition);
}
.cot-search:focus {
  border-color: var(--accent);
}
.cot-search::placeholder {
  color: var(--text-tertiary);
}
.cot-scroll {
  flex: 1;
  overflow-y: auto;
}
/* Project items */
.cot-project-item {
  padding: 8px 12px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  font-size: 12px;
  color: var(--text-primary);
  border-bottom: 1px solid var(--border);
}
.cot-project-item:hover {
  background: var(--bg);
}
.cot-project-item.active {
  background: var(--accent-light);
  color: var(--accent-dark);
}
.cot-project-path {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--font-mono);
  font-size: 11px;
}
.cot-project-count {
  flex-shrink: 0;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  background: var(--bg);
  color: var(--text-tertiary);
  border: 1px solid var(--border);
}
.cot-project-item.active .cot-project-count {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
/* Session items */
.cot-session-item {
  padding: 10px 12px;
  cursor: pointer;
  transition: all var(--transition);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cot-session-item:hover {
  background: var(--bg);
}
.cot-session-item.active {
  border-left: 3px solid var(--accent);
  background: var(--accent-light);
}
.cot-session-switch {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
/* Model switch popover */
.model-switch-popover {
  position: absolute;
  right: 8px;
  top: 100%;
  z-index: 50;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 6px;
  min-width: 140px;
  animation: modalIn 0.15s ease;
}
.model-switch-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.1s;
  color: var(--text-primary);
}
.model-switch-option:hover {
  background: var(--bg);
}
.model-switch-option.active {
  background: var(--accent-light);
  color: var(--accent-dark);
}
.model-switch-option .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.model-switch-backdrop {
  position: fixed;
  inset: 0;
  z-index: 49;
}
.cot-session-query {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}
.cot-session-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-tertiary);
}
.cot-session-time {
  flex-shrink: 0;
}
.cot-session-size {
  flex-shrink: 0;
}
/* Fullscreen viewer bar (shown when a session is opened) */
.cot-viewer-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(13,13,13,0.16);
  background: #ffffff;
}
.cot-viewer-bar button {
  padding: 5px 12px;
  border-radius: var(--radius-input);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--text-secondary);
  flex-shrink: 0;
  transition: all 0.15s;
}
.cot-viewer-bar button:hover {
  background: var(--bg);
  color: var(--text-primary);
  border-color: var(--border-hover);
}
#cot-viewer-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══ CoT tab: break out of main-content padding ═══ */
#tab-cot {
  margin: -24px -32px;
  height: 100vh;
  overflow: hidden;
}
#tab-cot .cot-layout {
  height: calc(100vh - 20px);
}
#cot-viewer-view {
  height: 100vh;
  display: flex;
  flex-direction: column;
}
#cot-cui-frame {
  flex: 1;
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">MSC</div>
    <div class="sidebar-nav">
      <div class="sidebar-item active" onclick="switchTab(0)">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        模型
      </div>
      <div class="sidebar-item" onclick="switchTab(1)">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        开销
      </div>
      <div class="sidebar-item" onclick="switchTab(2)">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        会话
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main-content">

  <!-- ═══ Tab 1: 模型配置 ═══ -->
  <div class="tab-content active" id="tab-config">
    <div class="card" style="padding:0;overflow:visible">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--text-primary)">模型等级</div>
          <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px">拖拽排序 · 点击卡片编辑</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost btn-small" onclick="checkAllModels()" id="check-all-btn" title="检测所有模型可用性">检测可用性</button>
          <button class="btn btn-primary btn-small" onclick="openAddModal()">+ 新增模型</button>
        </div>
      </div>
      <!-- Model levels (card pool) -->
      <div id="level-pools-container" style="padding:4px 0"></div>
      <!-- Pool divider -->
      <div style="padding:0 20px">
        <div style="display:flex;align-items:center;gap:10px;color:var(--text-tertiary);font-size:12px">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span>模型池 · 拖入上方分配等级</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
      </div>
      <!-- Pool -->
      <div class="pool-list" id="pool-list" style="padding:8px;min-height:48px"
        ondragover="handleZoneDragOver(event,'pool')"
        ondragleave="handleZoneDragLeave(event,'pool')"
        ondrop="handleZoneDrop(event,'pool')"></div>
      <!-- Footer -->
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg)">
        <button class="btn btn-ghost" onclick="undoChanges()">取消调整</button>
        <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
      </div>
    </div>
  </div>

  <!-- ═══ Tab 2: 用量分析 ═══ -->
  <div class="tab-content" id="tab-usage">
    <!-- Claude 订阅看板 -->
    <div class="card" id="claude-account-card" style="padding:20px;margin-bottom:16px;display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px" id="claude-avatar">C</div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text-primary)" id="claude-email">-</div>
            <div style="font-size:12px;color:var(--text-tertiary)" id="claude-sub-info">-</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-small" onclick="refreshClaudeAccount()">刷新</button>
      </div>
      <!-- Usage bars -->
      <div style="display:flex;flex-direction:column;gap:12px" id="claude-usage-bars">
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="font-weight:500">5 小时额度</span>
            <span id="claude-5h-pct" style="font-family:var(--font-mono)">-</span>
          </div>
          <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">
            <div id="claude-5h-bar" style="height:100%;width:0%;border-radius:4px;transition:width 0.5s"></div>
          </div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px" id="claude-5h-reset"></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="font-weight:500">7 天额度</span>
            <span id="claude-7d-pct" style="font-family:var(--font-mono)">-</span>
          </div>
          <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">
            <div id="claude-7d-bar" style="height:100%;width:0%;border-radius:4px;transition:width 0.5s"></div>
          </div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px" id="claude-7d-reset"></div>
        </div>
        <div id="claude-sonnet-row">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="font-weight:500">Sonnet 7 天额度</span>
            <span id="claude-s7d-pct" style="font-family:var(--font-mono)">-</span>
          </div>
          <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">
            <div id="claude-s7d-bar" style="height:100%;width:0%;border-radius:4px;transition:width 0.5s"></div>
          </div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px" id="claude-s7d-reset"></div>
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <div style="display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:12px">
        <button id="cur-cny" onclick="setCurrency('CNY')" style="padding:3px 10px;border:none;cursor:pointer;font-weight:600;background:var(--accent);color:#fff">¥ CNY</button>
        <button id="cur-usd" onclick="setCurrency('USD')" style="padding:3px 10px;border:none;cursor:pointer;font-weight:500;background:var(--bg);color:var(--text-secondary)">$ USD</button>
      </div>
    </div>

    <div class="stat-row">
      <div class="card stat-card" onclick="toggleDetail('token-detail')" style="cursor:pointer">
        <div class="stat-value" id="stat-tokens">-</div>
        <div class="stat-label">总 Token <span style="font-size:10px;opacity:0.5">▾</span></div>
        <div id="token-detail" style="display:none;margin-top:10px;font-size:12px;text-align:left;border-top:1px solid var(--border);padding-top:8px"></div>
      </div>
      <div class="card stat-card" onclick="toggleDetail('cost-detail')" style="cursor:pointer">
        <div class="stat-value" id="stat-cost">-</div>
        <div class="stat-label">混合模式费用 <span style="font-size:10px;opacity:0.5">▾</span></div>
        <div id="cost-detail" style="display:none;margin-top:10px;font-size:12px;text-align:left;border-top:1px solid var(--border);padding-top:8px"></div>
      </div>
      <div class="card stat-card" onclick="toggleDetail('saved-detail')" style="cursor:pointer">
        <div class="stat-value green" id="stat-saved">-</div>
        <div class="stat-label" id="stat-saved-label">已为您节省 <span style="font-size:10px;opacity:0.5">▾</span></div>
        <div id="saved-detail" style="display:none;margin-top:10px;font-size:12px;text-align:left;border-top:1px solid var(--border);padding-top:8px"></div>
      </div>
    </div>

    <!-- Model distribution -->
    <div class="card" style="padding:20px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-primary)">模型用量分布</h3>
      <div id="model-distribution" style="display:flex;gap:16px;flex-wrap:wrap"></div>
    </div>

    <!-- Per-project usage -->
    <div class="card" style="padding:20px;margin-top:16px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-primary)">项目用量排行</h3>
      <div id="project-usage"></div>
    </div>

    <!-- Fallback Protection -->
    <div class="card" style="padding:20px;margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-size:14px;font-weight:600;color:var(--text-primary)">Fallback 保护</h3>
        <button class="btn btn-ghost btn-small" onclick="loadFallbackLog()">刷新</button>
      </div>
      <!-- Circuit breaker status -->
      <div id="cb-status" style="margin-bottom:16px"></div>
      <!-- Fallback events -->
      <div id="fallback-log" style="max-height:320px;overflow-y:auto"></div>
    </div>
  </div>

  <!-- ═══ Tab 3: CoT ═══ -->
  <div class="tab-content" id="tab-cot">
    <!-- List view: two-column layout (projects + sessions) -->
    <div id="cot-list-view" style="display:block">
      <div class="cot-layout">
        <!-- Left: Project directory tree -->
        <div class="cot-panel cot-panel-projects">
          <div class="cot-panel-header">
            <input class="cot-search" id="cot-project-search" placeholder="搜索项目..." oninput="cotProjectSearchDebounced()">
          </div>
          <div class="cot-scroll" id="cot-project-list">
            <div class="empty-state">加载中...</div>
          </div>
        </div>
        <!-- Right: Session list -->
        <div class="cot-panel cot-panel-sessions">
          <div class="cot-panel-header" style="display:flex;gap:6px;align-items:center">
            <input class="cot-search" id="cot-session-search" placeholder="搜索 session_id / 内容..." oninput="cotSessionSearchDebounced()" style="flex:1">
            <button onclick="cotRefreshSessions()" title="刷新" style="padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-input);background:var(--surface);cursor:pointer;font-size:14px;color:var(--text-secondary);flex-shrink:0" id="cot-refresh-btn">&#8635;</button>
          </div>
          <div class="cot-scroll" id="cot-session-list">
            <div class="empty-state" style="padding:30px 12px">选择一个项目</div>
          </div>
        </div>
      </div>
    </div>
    <!-- Viewer view: CUI embedded full-page (no MSC header, CUI has its own) -->
    <div id="cot-viewer-view" style="display:none;position:relative">
      <iframe id="cot-cui-frame" style="width:100%;height:100vh;border:none;background:#fff"></iframe>
      <!-- Floating model switcher -->
      <div id="cot-viewer-model" style="position:absolute;top:8px;right:16px;z-index:10">
        <span id="cot-viewer-model-badge" class="model-tag" style="font-size:10px;cursor:pointer" onclick="cotShowSwitchPopover(this, cotSelectedSessionId)" title="点击切换模型"></span>
      </div>
    </div>
  </div>

  </div><!-- main-content -->
</div><!-- app -->

<!-- ═══ Unified Model Modal (Add / Edit) ═══ -->
<div class="overlay" id="model-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新增模型</h3>
      <button class="btn-icon" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <!-- Read-only rank (edit mode only) -->
      <!-- rank field removed -->

      <!-- Type selector -->
      <div class="type-selector" id="modal-type-selector">
        <div class="type-option active" onclick="selectType('claude', this)">
          <div class="type-option-title">官方 Claude</div>
          <div class="type-option-desc">OAuth 透传</div>
        </div>
        <div class="type-option" onclick="selectType('custom', this)">
          <div class="type-option-title">自定义 API</div>
          <div class="type-option-desc">兼容接口</div>
        </div>
      </div>

      <!-- Claude fields -->
      <div id="fields-claude">
        <div class="field">
          <label>模型</label>
          <select id="add-claude-model" onchange="onClaudeModelChange()">
            <optgroup label="Claude 4.6">
              <option value="claude-opus-4-6">Opus 4.6 (最强)</option>
              <option value="claude-sonnet-4-6">Sonnet 4.6 (均衡)</option>
            </optgroup>
            <optgroup label="Claude 4.5">
              <option value="claude-haiku-4-5-20251001">Haiku 4.5 (快速)</option>
            </optgroup>
            <option value="__custom__">自定义模型 ID...</option>
          </select>
          <input id="add-claude-model-custom" placeholder="输入模型 ID，如 claude-sonnet-4-5-20250514" style="display:none;margin-top:6px">
        </div>
        <div class="field-row">
          <div class="field">
            <label>显示名称</label>
            <input id="add-claude-name" placeholder="opus">
          </div>
          <div class="field">
            <label>别名命令</label>
            <input id="add-claude-alias" placeholder="co">
          </div>
        </div>
      </div>

      <!-- Custom fields -->
      <div id="fields-custom" style="display:none">
        <div class="field" id="preset-field">
          <label>快速预设 <span style="font-weight:400;color:var(--text-tertiary)">（选择后自动填充，也可直接手填）</span></label>
          <div class="chips">
            <div class="chip" onclick="applyPreset('glm', this)">GLM (智谱)</div>
            <div class="chip" onclick="applyPreset('glm-qianfan', this)">千帆 GLM</div>
            <div class="chip" onclick="applyPreset('deepseek', this)">DeepSeek</div>
            <div class="chip" onclick="applyPreset('moonshot', this)">Moonshot</div>
            <div class="chip" onclick="applyPreset('qwen', this)">Qwen (通义)</div>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>显示名称</label>
            <input id="add-custom-name" placeholder="如：glm、deepseek">
          </div>
          <div class="field">
            <label>别名命令 <span style="font-weight:400;color:var(--text-tertiary)">（可选）</span></label>
            <input id="add-custom-alias" placeholder="如：cg">
          </div>
        </div>
        <div class="field">
          <label>API 地址</label>
          <input id="add-custom-url" placeholder="https://open.bigmodel.cn/api/anthropic/v1/messages">
        </div>
        <div class="field">
          <label>模型名称</label>
          <input id="add-custom-model" placeholder="如：glm-5.1、deepseek-chat">
        </div>
        <div class="field-row">
          <div class="field">
            <label>API Key</label>
            <div style="position:relative">
              <input id="add-custom-key" type="password" placeholder="sk-..." style="padding-right:36px">
              <button type="button" onclick="toggleKeyVisibility()" id="key-eye-btn"
                style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--text-tertiary);display:flex;align-items:center"
                title="显示/隐藏密钥" aria-label="切换密钥可见性">
                <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label>代理（可选）</label>
            <input id="add-custom-proxy" placeholder="http://127.0.0.1:7897">
          </div>
        </div>
      </div>

      <!-- Routing context -->
      <div class="field">
        <label>路由场景 <span style="font-weight:400;color:var(--text-tertiary)">（什么时候使用这个模型）</span></label>
        <input id="add-context" placeholder="如：代码开发、需求评审、测试工作">
      </div>

      <!-- Color picker -->
      <div class="field">

      <!-- Add to levels checkbox (add mode only) -->

        添加到模型等级

      <!-- Set as default checkbox (edit mode only) -->

        <label class="checkbox-row" style="margin:0">

      </div>

    <div class="modal-footer" style="display:flex;justify-content:space-between">

</div>

              title="显示/隐藏密钥">
              <svg class="pv-eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="pv-eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>

          <select id="pv-edit-role">
            <option value="primary">主 primary</option>
            <option value="backup">备 backup</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>代理 <span style="font-weight:400;color:var(--text-tertiary)">（可选，留空使用全局代理）</span></label>
        <input id="pv-edit-proxy" placeholder="http://127.0.0.1:7897">
      </div>

      <button class="btn btn-ghost" onclick="closeProviderEditModal()">取消</button>
      <button class="btn btn-primary" id="pv-edit-submit-btn" onclick="submitProviderEdit()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   MSC — Dashboard Logic
   ═══════════════════════════════════════════ */

const API_BASE = '';

// Prices in $/MTok. GLM original is ¥/MTok, converted here.
const CNY_TO_USD = 1 / 7.25;
const PRICE = {
  glm:       { input: 0.55 * CNY_TO_USD, output: 2.48 * CNY_TO_USD, cache_read: 0.55 * CNY_TO_USD, cache_create: 0.55 * CNY_TO_USD },
  sonnet:    { input: 3,    output: 15,   cache_read: 0.30, cache_create: 3.75 },
  anthropic: { input: 3,    output: 15,   cache_read: 0.30, cache_create: 3.75 }
};

const PRESETS = {
  glm:      { url: 'https://open.bigmodel.cn/api/anthropic/v1/messages',          model: 'glm-5.1',          name: 'glm',      alias: 'cg' },
  'glm-qianfan': { url: 'https://qianfan.baidubce.com/anthropic/v1/messages',     model: 'glm-5.1',          name: 'glm-qianfan', alias: 'cgq' },
  deepseek: { url: 'https://api.deepseek.com/v1/messages',                        model: 'deepseek-chat',    name: 'deepseek',  alias: 'cd' },
  moonshot: { url: 'https://api.moonshot.cn/v1/messages',                          model: 'moonshot-v1-auto', name: 'moonshot',  alias: 'cm' },
  qwen:     { url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/messages',   model: 'qwen-max',        name: 'qwen',      alias: 'cq' }
};

var currentCurrency = 'CNY'; // 'CNY' or 'USD'

function setCurrency(c) {
  currentCurrency = c;
  document.getElementById('cur-cny').style.background = c === 'CNY' ? 'var(--accent)' : 'var(--bg)';
  document.getElementById('cur-cny').style.color = c === 'CNY' ? '#fff' : 'var(--text-secondary)';
  document.getElementById('cur-usd').style.background = c === 'USD' ? 'var(--accent)' : 'var(--bg)';
  document.getElementById('cur-usd').style.color = c === 'USD' ? '#fff' : 'var(--text-secondary)';
  // Re-render stats with new currency
  if (typeof allSessions !== 'undefined' && allSessions.length) {
    renderStats(allSessions);
  }
}

function fmtMoney(usd) {
  if (currentCurrency === 'CNY') return '\u00a5' + (usd * CNY_RATE).toFixed(2);
  return '$' + usd.toFixed(3);
}

function fmtMoneyDetail(usd) {
  if (currentCurrency === 'CNY') return '\u00a5' + (usd * CNY_RATE).toFixed(4);
  return '$' + usd.toFixed(4);
}

const COLOR_PALETTE = [
  '#c96442', '#e74c3c', '#e91e63', '#d97706',
  '#f59e0b', '#84cc16', '#2d8a56', '#10b981',
  '#0891b2', '#06b6d4', '#4a6fa5', '#3b82f6',
  '#6366f1', '#7c5cbf', '#a855f7', '#ec4899',
  '#78716c', '#9b9590'
];

const CNY_RATE = 7.25; // approximate USD to CNY

let config = null;
let configSnapshot = null;
let currentAddType = 'claude';
let dragSourceEl = null;
let modalMode = 'add'; // 'add' or 'edit'
let editIdx = -1;
let selectedColor = COLOR_PALETTE[0];

// ═══════════════════════════════════════════
// Tab switching
// ═══════════════════════════════════════════

function switchTab(index) {
  var items = document.querySelectorAll('.sidebar-item');
  var contents = document.querySelectorAll('.tab-content');
  items.forEach(function(item, i) { item.classList.toggle('active', i === index); });
  for (var i = 0; i < contents.length; i++) {
    contents[i].classList.toggle('active', i === index);
  }
  if (index === 1) { loadSessionManagement(); loadFallbackLog(); }
  if (index === 2) loadCotProjects();
  // Save state
  try { localStorage.setItem('msc-tab', String(index)); } catch(e) {}
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════

async function init() {
  try {
    var resp = await fetch(API_BASE + '/config');
    config = await resp.json();
    configSnapshot = JSON.stringify(config);
    render();
  } catch (e) {
    showToast('加载配置失败', 'error');
  }
  // Restore last tab
  try {
    var savedTab = parseInt(localStorage.getItem('msc-tab') || '0');
    if (savedTab > 0 && savedTab <= 2) switchTab(savedTab);
    // Restore CoT project
    var savedProject = localStorage.getItem('msc-cot-project');
    if (savedTab === 2 && savedProject) {
      setTimeout(function() { cotSelectProject(savedProject); }, 300);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════

function render() {
  renderLevelPools();
  renderPool();
  // Show dirty indicator
  var isDirty = configSnapshot && JSON.stringify(config) !== configSnapshot;
  var saveBtn = document.querySelector('#tab-config .btn-primary[onclick="saveConfig()"]');
  var cancelBtn = document.querySelector('#tab-config .btn-ghost[onclick="undoChanges()"]');
  if (saveBtn) saveBtn.style.opacity = isDirty ? '1' : '0.5';
  if (cancelBtn) cancelBtn.style.display = isDirty ? '' : 'none';
}


// Provider name mapping for display
var PROVIDER_DISPLAY_NAMES = {
  'glm': '官方 GLM',
  'glm-qianfan': '千帆 GLM',
  'anthropic': 'Claude'
};

function getProviderDisplayName(providerKey) {
  return PROVIDER_DISPLAY_NAMES[providerKey] || providerKey;
}

function getProviderTypeLabel(providerKey) {
  if (providerKey === 'anthropic') return '官方';
  if (config && config.providers && config.providers[providerKey] && config.providers[providerKey].passthrough_auth) return '官方';
  return '自定义';
}

// Normalize providers: if level has single `provider` string, wrap into providers array
function getLevelProviders(level) {
  if (level.providers && Array.isArray(level.providers)) {
    return level.providers;
  }
  // Backward compat: single provider string
  if (level.provider) {
    return [{ provider: level.provider, role: 'primary' }];
  }
  return [];
}

function renderLevelPools() {
  var el = document.getElementById('level-pools-container');
  var sorted = getSortedLevels();
  var defaultLevel = config ? config.default_level || 1 : 1;

  if (!sorted.length) {
    el.innerHTML = '<div class="pool-empty" style="padding:24px;text-align:center;color:var(--text-tertiary)">暂无模型，点击「+ 新增模型」添加</div>';
    return;
  }

  el.innerHTML = sorted.map(function(entry, i) {
    var levelNum = parseInt(entry[0]);
    var level = entry[1];
    var isDefault = levelNum === defaultLevel;
    var color = level.color || '#c96442';
    var providers = getLevelProviders(level);

    // Health data per-provider from _health_details
    var healthDetails = level._health_details || {};

    var defaultBadge = isDefault ? '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:#2d8a5618;color:#2d8a56;font-weight:600;flex-shrink:0">默认</span>' : '';

    // Provider cards HTML
    var providerCardsHtml = providers.map(function(pv, pi) {
      var pvKey = pv.provider;
      var pvRole = pv.role || (pi === 0 ? 'primary' : 'backup');
      var pvDisplayName = getProviderDisplayName(pvKey);
      var pvTypeLabel = getProviderTypeLabel(pvKey);

      // Health status for this provider
      var pvHealth = healthDetails[pvKey] || {};
      var pvStatus = pvHealth.status || level._status || '';
      var pvError = pvHealth.error || '';
      var healthDotClass = pvStatus === 'ok' ? 'ok' : pvStatus === 'fail' ? 'fail' : 'unknown';
      var healthLabel = pvStatus === 'ok' ? '健康' : pvStatus === 'fail' ? (pvError || '不可用') : '未知';
      var healthTitle = pvStatus === 'ok' ? '可用' : (pvError || '状态未知');

      var roleChipHtml = pvRole === 'primary'
        ? '<span class="role-chip primary">主 primary</span>'
        : '<span class="role-chip backup">备 backup</span>';

      return '<div class="provider-card" draggable="true"' +
        ' data-level-index="' + i + '"' +
        ' data-provider-index="' + pi + '"' +
        ' ondragstart="handleProviderDragStart(event)"' +
        ' ondragend="handleProviderDragEnd(event)"' +
        ' ondragover="handleProviderDragOver(event)"' +
        ' ondragleave="handleProviderDragLeave(event)"' +
        ' ondrop="handleProviderDrop(event)">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          '<div class="provider-name">' + escHtml(pvDisplayName) +
            '<span style="font-size:10px;color:var(--text-tertiary);font-weight:400;margin-left:4px">' + escHtml(pvTypeLabel) + '</span>' +
          '</div>' +
          '<div style="display:flex;gap:2px;flex-shrink:0">' +
            '<button class="btn-icon" onclick="editProviderInPool(' + i + ',' + pi + ',event)" title="编辑供应商" style="color:var(--text-tertiary);width:22px;height:22px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
            (providers.length > 1 ? '<button class="btn-icon" onclick="removeProviderFromPool(' + i + ',' + pi + ',event)" title="移除供应商" style="color:var(--text-tertiary);width:22px;height:22px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' : '') +
          '</div>' +
        '</div>' +
        '<div class="provider-health">' +
          '<span class="health-dot ' + healthDotClass + '" title="' + escHtml(healthTitle) + '"></span>' +
          '<span title="' + escHtml(healthTitle) + '">' + escHtml(healthLabel) + '</span>' +
        '</div>' +
        roleChipHtml +
      '</div>';
    }).join('');

    // Level pool status dot (aggregate)
    var statusTitle = level._health_error || '';
    var statusDot = level._status === 'ok' ? '<span title="可用" style="color:#2d8a56;font-size:12px">●</span>'
      : level._status === 'fail' ? '<span title="' + escHtml(statusTitle || '不可用') + '" style="color:#e74c3c;font-size:12px">●</span>'
      : level._status === 'warn' ? '<span title="' + escHtml(statusTitle) + '" style="color:#d97706;font-size:12px">●</span>'
      : '';

    return '<div class="level-pool" draggable="true"' +
      ' data-level-index="' + i + '"' +
      ' ondragstart="handleLevelDragStart(event)"' +
      ' ondragend="handleLevelDragEnd(event)"' +
      ' ondragover="handleLevelDragOver(event)"' +
      ' ondragleave="handleLevelDragLeave(event)"' +
      ' ondrop="handleLevelDrop(event)">' +
      '<div class="level-pool-header">' +
        '<div class="level-pool-header-left">' +
          '<div class="model-grip" style="cursor:grab">\u2807</div>' +
          '<div class="model-rank" style="background:' + color + '20;color:' + color + '">' + (i + 1) + '</div>' +
          '<div class="model-name">' + escHtml((level.name || '?').toUpperCase()) + '</div>' +
          '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>' +
          defaultBadge +
          statusDot +
          (level.context ? '<span style="font-size:11px;color:var(--text-tertiary)">' + escHtml(level.context) + '</span>' : '') +
        '</div>' +
        '<div class="model-actions">' +
          '<span class="model-meta">' + escHtml(level.model) + '</span>' +
          '<button class="btn-icon" onclick="openEdit(' + i + ', event)" title="编辑" style="color:var(--text-tertiary)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
          '<button class="btn-icon" onclick="moveToPool(' + i + ', event)" title="降级到模型池" style="color:var(--text-tertiary)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>' +
        '</div>' +
      '</div>' +
      '<div class="level-pool-providers"' +
        ' data-level-index="' + i + '"' +
        ' ondragover="handleProviderZoneDragOver(event)"' +
        ' ondragleave="handleProviderZoneDragLeave(event)"' +
        ' ondrop="handleProviderZoneDrop(event)">' +
        providerCardsHtml +
      '</div>' +
      '<div class="level-pool-footer">' +
        '<button class="btn btn-ghost btn-small" onclick="addProviderToLevel(' + i + ', event)" style="font-size:11px">+ 添加供应商</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderPool() {
  var el = document.getElementById('pool-list');
  var pool = config._pool || [];

  if (!pool.length) {
    el.innerHTML = '<div class="pool-empty">没有未排序的模型</div>';
    return;
  }

  el.innerHTML = pool.map(function(item, i) {
    var provLabel = item.provider === 'anthropic' ? '官方' : '自定义';
    var aliasHtml = item.alias ? '<span class="alias-chip">' + escHtml(item.alias) + '</span>' : '';

    return '<div class="pool-item" draggable="true" data-pool-index="' + i + '"' +
      ' ondragstart="handleDragStart(event)"' +
      ' ondragend="handleDragEnd(event)"' +
      ' ondragover="handleDragOver(event)"' +
      ' ondragleave="handleDragLeave(event)"' +
      ' ondrop="handleDrop(event)">' +
      '<div class="model-grip">\u2807</div>' +
      '<div class="model-body">' +
        '<div>' +
          '<div class="model-name">' + escHtml((item.name || '?').toUpperCase()) + '</div>' +
          '<div class="model-meta">' + escHtml(provLabel) + ' \u00b7 ' + escHtml(item.model) + '</div>' +
        '</div>' +
        aliasHtml +
      '</div>' +
      '<div class="model-actions">' +
        '<button class="btn-icon" onclick="openEditPool(' + i + ', event)" title="编辑" style="color:var(--text-tertiary)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
        '<button class="btn-icon" onclick="confirmDeletePool(' + i + ', event)" title="删除" style="color:var(--text-tertiary)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════

function getSortedLevels() {
  if (!config || !config.levels) return [];
  return Object.entries(config.levels).sort(function(a, b) {
    return Number(a[0]) - Number(b[0]);
  });
}

function rebuildLevels(arr) {
  var levels = {};
  arr.forEach(function(item, i) {
    levels[String(i + 1)] = item;
  });
  config.levels = levels;
}

function escHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ═══════════════════════════════════════════
// Color Picker
// ═══════════════════════════════════════════

function getUsedColors() {
  var used = {};
  var sorted = getSortedLevels();
  sorted.forEach(function(entry) {
    if (entry[1].color) used[entry[1].color] = true;
  });
  var pool = config._pool || [];
  pool.forEach(function(item) {
    if (item.color) used[item.color] = true;
  });
  return used;
}

function getDefaultColor() {
  var used = getUsedColors();
  for (var i = 0; i < COLOR_PALETTE.length; i++) {
    if (!used[COLOR_PALETTE[i]]) return COLOR_PALETTE[i];
  }
  return '#9b9590';
}

function renderColorPicker(selected) {
  var picker = document.getElementById('color-picker');
  selectedColor = selected || getDefaultColor();
  picker.innerHTML = COLOR_PALETTE.map(function(c) {
    var isSelected = c === selectedColor;
    return '<div class="color-dot' + (isSelected ? ' selected' : '') + '"' +
      ' style="background:' + c + '"' +
      ' onclick="pickColor(\'' + c + '\')">' +
      (isSelected ? '\u2713' : '') +
    '</div>';
  }).join('');
}

function pickColor(color) {
  selectedColor = color;
  var dots = document.querySelectorAll('#color-picker .color-dot');
  for (var i = 0; i < dots.length; i++) {
    var isThis = COLOR_PALETTE[i] === color;
    dots[i].classList.toggle('selected', isThis);
    dots[i].textContent = isThis ? '\u2713' : '';
  }
}

// ═══════════════════════════════════════════
// Drag and Drop
// ═══════════════════════════════════════════

var dragMode = null; // 'level', 'provider', 'pool'
var dragData = null;

// ── Pool item drag (unchanged) ──

function handleDragStart(e) {
  dragSourceEl = e.currentTarget;
  dragSourceEl.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  dragSourceEl._fromPool = true;
  dragSourceEl._fromIdx = Number(dragSourceEl.getAttribute('data-pool-index'));
  dragMode = 'pool';
  dragData = { poolIdx: dragSourceEl._fromIdx };
}

function handleDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.pool-item, .level-pool, .provider-card').forEach(function(el) {
    el.classList.remove('drag-over');
    el.classList.remove('drag-over-pool');
  });
  document.querySelectorAll('.pool-list, .level-pool-providers').forEach(function(el) {
    el.classList.remove('drop-target');
  });
  dragSourceEl = null;
  dragMode = null;
  dragData = null;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (e.currentTarget !== dragSourceEl) {
    e.currentTarget.classList.add('drag-over');
  }
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

// ── Level drag (reorder levels) ──

function handleLevelDragStart(e) {
  // If the drag originated from a provider card inside the level pool, ignore
  if (e.target.closest && e.target.closest('.provider-card')) {
    e.preventDefault();
    return;
  }
  dragMode = 'level';
  var el = e.currentTarget;
  dragData = { levelIndex: Number(el.getAttribute('data-level-index')) };
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleLevelDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.level-pool').forEach(function(el) {
    el.classList.remove('drag-over-pool');
  });
  dragMode = null;
  dragData = null;
}

function handleLevelDragOver(e) {
  if (dragMode !== 'level') return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var target = e.currentTarget;
  if (target !== e.currentTarget.closest('.level-pool') || target === dragSourceEl) return;
  if (target !== e.currentTarget) return;
  target.classList.add('drag-over-pool');
}

function handleLevelDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-pool');
}

function handleLevelDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over-pool');
  if (dragMode !== 'level' || !dragData) return;

  var fromLevelIdx = dragData.levelIndex;
  var toLevelIdx = Number(e.currentTarget.getAttribute('data-level-index'));

  if (fromLevelIdx === toLevelIdx) return;

  var sorted = getSortedLevels().map(function(entry) { return entry[1]; });
  var moved = sorted.splice(fromLevelIdx, 1)[0];
  sorted.splice(toLevelIdx, 0, moved);
  rebuildLevels(sorted);
  render();
}

// ── Provider card drag (reorder within/between pools) ──

function handleProviderDragStart(e) {
  e.stopPropagation(); // Don't trigger level drag
  dragMode = 'provider';
  var el = e.currentTarget;
  var levelIdx = Number(el.getAttribute('data-level-index'));
  var provIdx = Number(el.getAttribute('data-provider-index'));
  dragData = { levelIndex: levelIdx, providerIndex: provIdx };
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleProviderDragEnd(e) {
  e.stopPropagation();
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.provider-card').forEach(function(el) {
    el.classList.remove('drag-over');
  });
  document.querySelectorAll('.level-pool-providers').forEach(function(el) {
    el.classList.remove('drop-target');
  });
  dragMode = null;
  dragData = null;
}

function handleProviderDragOver(e) {
  if (dragMode !== 'provider') return;
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  if (e.currentTarget !== dragSourceEl) {
    e.currentTarget.classList.add('drag-over');
  }
}

function handleProviderDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function handleProviderDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  var target = e.currentTarget;
  target.classList.remove('drag-over');
  if (dragMode !== 'provider' || !dragData) return;
  if (target === e.currentTarget.closest('.provider-card[draggable]')) return;

  var fromLevelIdx = dragData.levelIndex;
  var fromProvIdx = dragData.providerIndex;
  var toLevelIdx = Number(target.getAttribute('data-level-index'));
  var toProvIdx = Number(target.getAttribute('data-provider-index'));

  // Same position
  if (fromLevelIdx === toLevelIdx && fromProvIdx === toProvIdx) return;

  var sorted = getSortedLevels();
  var fromLevel = sorted[fromLevelIdx][1];
  var toLevel = sorted[toLevelIdx][1];

  var fromProviders = getLevelProviders(fromLevel);
  var toProviders = getLevelProviders(toLevel);

  var movedProv = fromProviders.splice(fromProvIdx, 1)[0];

  // If same level, adjust target index if needed
  if (fromLevelIdx === toLevelIdx && fromProvIdx < toProvIdx) {
    toProvIdx--;
  }

  toProviders.splice(toProvIdx, 0, movedProv);

  // Write back providers
  fromLevel.providers = fromProviders;
  if (fromLevel.provider) delete fromLevel.provider;
  toLevel.providers = toProviders;
  if (toLevel.provider) delete toLevel.provider;

  render();
}

// Zone-level drop handlers for provider zones (within a pool)
function handleProviderZoneDragOver(e) {
  if (dragMode !== 'provider' && dragMode !== 'pool') return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}

function handleProviderZoneDragLeave(e) {
  e.currentTarget.classList.remove('drop-target');
}

function handleProviderZoneDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');

  var toLevelIdx = Number(e.currentTarget.getAttribute('data-level-index'));

  // Handle pool item dropped onto a level-pool-providers zone
  if (dragMode === 'pool' && dragSourceEl) {
    var fromIdx = dragSourceEl._fromIdx;
    // Use moveToSorted to add the pool item as a new level entry
    moveToSorted(fromIdx);
    return;
  }

  if (dragMode !== 'provider' || !dragData) return;

  var fromLevelIdx = dragData.levelIndex;
  var fromProvIdx = dragData.providerIndex;

  // Same level, same zone — already handled by card-to-card drop
  if (fromLevelIdx === toLevelIdx) return;

  var sorted = getSortedLevels();
  var fromLevel = sorted[fromLevelIdx][1];
  var toLevel = sorted[toLevelIdx][1];

  var fromProviders = getLevelProviders(fromLevel);
  var toProviders = getLevelProviders(toLevel);

  var movedProv = fromProviders.splice(fromProvIdx, 1)[0];

  // Add to end of target pool
  toProviders.push(movedProv);

  fromLevel.providers = fromProviders;
  if (fromLevel.provider) delete fromLevel.provider;
  toLevel.providers = toProviders;
  if (toLevel.provider) delete toLevel.provider;

  render();
}

// Zone-level drop handlers (for cross-zone dragging: pool <-> levels)
function handleZoneDragOver(e, zone) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function handleZoneDragLeave(e, zone) {
  e.currentTarget.classList.remove('drop-target');
}
function handleZoneDrop(e, zone) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if (!dragSourceEl || dragMode !== 'pool') return;

  var fromPool = true;
  var fromIdx = dragSourceEl._fromIdx;

  if (zone === 'sorted') {
    // Pool → Levels: add to end of levels
    moveToSorted(fromIdx);
  } else if (zone === 'pool') {
    // Already in pool, do nothing
  }
}

function handleDrop(e) {
  e.preventDefault();
  var target = e.currentTarget;
  target.classList.remove('drag-over');

  if (!dragSourceEl || target === dragSourceEl) return;

  // Pool item dropped ON another pool item
  if (dragMode === 'pool' && target.hasAttribute('data-pool-index')) {
    // Pool reorder — not critical, ignore
    return;
  }
}

function editProviderInPool(levelIdx, providerIdx, e) {

    document.getElementById('pv-edit-apikey').value = provCfg.key || '';

function togglePvKeyVisibility() {
  var input = document.getElementById('pv-edit-apikey');
  var overlay = document.getElementById('provider-edit-overlay');
  var eyeOpen = overlay.querySelector('.pv-eye-open');

function submitProviderEdit() {
  var levelIdx = _pvEditState.levelIdx;
  if (levelIdx < 0) return;

  var sorted = getSortedLevels();
  if (!sorted[levelIdx]) return;
  var level = sorted[levelIdx][1];
  var providers = getLevelProviders(level);

  var newUrl = document.getElementById('pv-edit-url').value.trim();
  var newKey = document.getElementById('pv-edit-apikey').value.trim();
  var newProxy = document.getElementById('pv-edit-proxy').value.trim();

  // Validate URL
  if (!newUrl) {
    showToast('Base URL 不能为空', 'error');
    return;
  }

  if (_pvEditState.mode === 'add') {
    // --- Add mode ---
    var providerKey = document.getElementById('pv-edit-key').value.trim().toLowerCase();
    if (!providerKey || !/^[a-z0-9][a-z0-9-]*$/.test(providerKey)) {
      showToast('供应商标识格式不正确（仅限英文、数字、连字符）', 'error');
      return;
    }
    var exists = providers.some(function(p) { return p.provider === providerKey; });
    if (exists) {
      showToast('该供应商已存在于当前层级', 'error');
      return;
    }

    // Create provider entry
    if (!config.providers) config.providers = {};
    var provConfig = { url: newUrl };
    if (newKey) provConfig.key = newKey;
    if (newProxy) provConfig.proxy = newProxy;
    config.providers[providerKey] = provConfig;

    var role = providers.length === 0 ? 'primary' : 'backup';
    providers.push({ provider: providerKey, role: role });
    level.providers = providers;
    if (level.provider) delete level.provider;
  } else {
    // --- Edit mode ---
    var providerIdx = _pvEditState.providerIdx;
    if (!providers[providerIdx]) return;
    var pv = providers[providerIdx];
    var pvKey = pv.provider;

    // Update provider config
    if (!config.providers) config.providers = {};
    var updated = config.providers[pvKey] || {};
    updated.url = newUrl;
    if (newKey) updated.key = newKey;
    if (newProxy) updated.proxy = newProxy;
    else delete updated.proxy;
    config.providers[pvKey] = updated;

    // Update role
    var newRole = document.getElementById('pv-edit-role').value;
    providers[providerIdx].role = newRole;
    // Ensure only one primary per pool
    if (newRole === 'primary') {
      for (var j = 0; j < providers.length; j++) {
        if (j !== providerIdx) providers[j].role = 'backup';
      }
    }
    level.providers = providers;
  }

  closeProviderEditModal();
  render();
  showToast('供应商已更新');
}

function removeProviderFromPool(levelIdx, providerIdx, e) {
  if (e) e.stopPropagation();
  var sorted = getSortedLevels();
  if (!sorted[levelIdx]) return;
  var level = sorted[levelIdx][1];
  var providers = getLevelProviders(level);
  if (providers.length <= 1) {
    showToast('至少保留一个供应商', 'error');
    return;
  }
  var removed = providers.splice(providerIdx, 1)[0];
  // Ensure first provider is primary
  if (providers.length > 0) providers[0].role = 'primary';
  level.providers = providers;

  // Move removed provider to pool
  if (!config._pool) config._pool = [];
  config._pool.push({
    name: removed.provider,
    provider: removed.provider,
    model: level.model,
    color: level.color
  });

  render();
  showToast('已移除供应商');
}

function openEdit(idx, e) {
  if (e && e.stopPropagation) e.stopPropagation();
  var sorted = getSortedLevels();
  if (!sorted[idx]) return;

  modalMode = 'edit';
  editIdx = idx;
  var item = sorted[idx][1];

  // Set type — check primary provider from providers array or legacy provider field
  var primaryProvider = item.provider;
  if (!primaryProvider && item.providers && item.providers.length > 0) {
    primaryProvider = item.providers[0].provider;
  }
  var isCustom = primaryProvider !== 'anthropic';
  currentAddType = isCustom ? 'custom' : 'claude';

  // Update type selector visual
  var options = document.querySelectorAll('#modal-type-selector .type-option');
  options[0].classList.toggle('active', !isCustom);
  options[1].classList.toggle('active', isCustom);
  updateTypeSelection();

  // Edit mode UI
  document.getElementById('modal-title').textContent = '编辑模型';
  document.getElementById('add-to-levels-row').style.display = 'none';
  document.getElementById('set-default-row').style.display = 'block';
  var levelNum = parseInt(sorted[idx][0]);
  var isCurrentDefault = (config.default_level || 1) === levelNum;
  var cb = document.getElementById('set-as-default');
  cb.checked = isCurrentDefault;
  cb.disabled = isCurrentDefault; // Can't uncheck default — must set another as default
  document.getElementById('set-default-hint').textContent = isCurrentDefault
    ? '当前默认模型，如需更换请在其他模型上勾选此项'
    : '新 session 将使用此模型启动';
  // Show/hide delete button: can't delete default model
  document.getElementById('modal-delete-btn').style.display = isCurrentDefault ? 'none' : '';
  document.getElementById('modal-submit-btn').textContent = '保存';
  document.getElementById('modal-submit-btn').onclick = submitModal;
  // Type selector still clickable in edit mode (to switch provider type if desired)
  document.getElementById('modal-type-selector').style.pointerEvents = '';
  document.getElementById('modal-type-selector').style.opacity = '';
  document.getElementById('preset-field').style.display = isCustom ? '' : 'none';

  // Fill fields based on type
  if (!isCustom) {
    // Claude type
    var modelSelect = document.getElementById('add-claude-model');
    for (var i = 0; i < modelSelect.options.length; i++) {
      if (modelSelect.options[i].value === item.model) {
        modelSelect.selectedIndex = i;
        break;
      }
    }
    document.getElementById('add-claude-name').value = item.name || '';
    document.getElementById('add-claude-alias').value = item.alias || '';
  } else {
    // Custom type
    document.getElementById('add-custom-name').value = item.name || '';
    document.getElementById('add-custom-alias').value = item.alias || '';
    document.getElementById('add-custom-model').value = item.model || '';
    if (config.providers && config.providers[primaryProvider]) {
      var prov = config.providers[primaryProvider];
      document.getElementById('add-custom-url').value = prov.url || '';
      document.getElementById('add-custom-proxy').value = prov.proxy || '';
      // Fetch full key for editing
      fetch('/config?show_keys=1').then(function(r){return r.json()}).then(function(full){
        if(full.providers && full.providers[primaryProvider]){
          document.getElementById('add-custom-key').value = full.providers[primaryProvider].key || '';
        }
      }).catch(function(){
        document.getElementById('add-custom-key').value = prov.key || '';
      });
    } else {
      document.getElementById('add-custom-url').value = '';
      document.getElementById('add-custom-key').value = '';
      document.getElementById('add-custom-proxy').value = '';
    }
    // Deactivate all preset chips in edit mode
    var chips = document.querySelectorAll('#fields-custom .chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].classList.remove('active');
    }
  }

  document.getElementById('add-context').value = item.context || '';
  renderColorPicker(item.color || getDefaultColor());
  document.getElementById('model-overlay').classList.add('show');
}

function submitAdd() {
  var addToLevels = document.getElementById('add-to-levels').checked;
  var item;

  if (currentAddType === 'claude') {
    var model = getClaudeModel();
    if (!model) { showToast('请输入模型名称', 'error'); return; }
    var name = document.getElementById('add-claude-name').value.trim() || model.split('-').slice(1, 2)[0] || 'claude';
    var alias = document.getElementById('add-claude-alias').value.trim();
    item = { name: name, provider: 'anthropic', model: model };
    if (alias) item.alias = alias;
  } else {
    var name = document.getElementById('add-custom-name').value.trim();
    var url = document.getElementById('add-custom-url').value.trim();
    var model = document.getElementById('add-custom-model').value.trim();
    var key = document.getElementById('add-custom-key').value.trim();
    var alias = document.getElementById('add-custom-alias').value.trim();
    var proxy = document.getElementById('add-custom-proxy').value.trim();

    if (!name || !url || !model) {
      showToast('请填写必要字段', 'error');
      return;
    }

    var providerName = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (!config.providers) config.providers = {};
    var providerConfig = { url: url };
    if (key) providerConfig.key = key;
    if (proxy) providerConfig.proxy = proxy;
    config.providers[providerName] = providerConfig;

    item = { name: name, provider: providerName, model: model };
    if (alias) item.alias = alias;
  }

  item.color = selectedColor;
  var ctx = document.getElementById('add-context').value.trim();
  if (ctx) item.context = ctx;

  if (addToLevels) {
    var sorted = getSortedLevels().map(function(e) { return e[1]; });
    sorted.push(item);
    rebuildLevels(sorted);
  } else {
    if (!config._pool) config._pool = [];
    config._pool.push(item);
  }

  render();
  closeModal();
  showToast('已添加');
}

function submitEdit() {
  if (editIdx < 0) return;
  var sorted = getSortedLevels();
  var key = sorted[editIdx][0];
  var item = config.levels[key];

  if (currentAddType === 'claude') {
    item.name = document.getElementById('add-claude-name').value.trim() || item.name;
    item.model = getClaudeModel();
    var alias = document.getElementById('add-claude-alias').value.trim();
    item.alias = alias || undefined;
    // Update primary provider to anthropic
    var currentPrimary = item.provider || (item.providers && item.providers[0] ? item.providers[0].provider : '');
    if (currentPrimary !== 'anthropic') {
      item.provider = 'anthropic';
      // Also update the providers array
      var providers = getLevelProviders(item);
      if (providers.length > 0) {
        providers[0].provider = 'anthropic';
        item.providers = providers;
      }
      delete item.provider;
    }
  } else {
    var name = document.getElementById('add-custom-name').value.trim();
    var url = document.getElementById('add-custom-url').value.trim();
    var model = document.getElementById('add-custom-model').value.trim();
    var apiKey = document.getElementById('add-custom-key').value.trim();
    var alias = document.getElementById('add-custom-alias').value.trim();
    var proxy = document.getElementById('add-custom-proxy').value.trim();

    item.name = name || item.name;
    item.model = model || item.model;
    item.alias = alias || undefined;

    var providerName = (name || item.name).toLowerCase().replace(/[^a-z0-9]/g, '');
    if (!config.providers) config.providers = {};
    var providerConfig = config.providers[providerName] || {};
    if (url) providerConfig.url = url;
    if (apiKey) providerConfig.key = apiKey;
    if (proxy) providerConfig.proxy = proxy;
    config.providers[providerName] = providerConfig;

    // Update providers array
    var providers = getLevelProviders(item);
    if (providers.length > 0) {
      providers[0].provider = providerName;
      item.providers = providers;
      delete item.provider;
    } else {
      item.provider = providerName;
    }
  }

  item.color = selectedColor;
  var ctx = document.getElementById('add-context').value.trim();
  item.context = ctx || undefined;

  // Handle default level change
  var setDefault = document.getElementById('set-as-default').checked;
  var sorted = getSortedLevels();
  var levelNum = parseInt(sorted[editIdx][0]);
  var currentDefault = config.default_level || 1;

  if (setDefault && levelNum !== currentDefault) {
    var oldName = '';
    var oldLevel = config.levels[String(currentDefault)];
    if (oldLevel) oldName = (oldLevel.name || '').toUpperCase();
    var newName = (item.name || '').toUpperCase();
    if (!confirm('确定将默认模型从 ' + oldName + ' 更改为 ' + newName + '？\n新 session 将使用 ' + newName + ' 启动')) {
      return;
    }
    config.default_level = levelNum;
  } else if (!setDefault && levelNum === currentDefault) {
    // Unchecked default on current default → reset to level 1
    config.default_level = 1;
  }

  closeModal();
  render();
  showToast('已更新');
}

function deleteFromModal() {
  if (editIdx < 0) return;
  if (isDefaultLevel(editIdx)) {
    showToast('默认模型不能删除，请先取消默认勾选并保存', 'error');
    return;
  }
  var sorted = getSortedLevels();
  if (sorted.length <= 1) {
    showToast('至少保留一个模型等级', 'error');
    return;
  }
  var name = (sorted[editIdx][1].name || '').toUpperCase();
  if (!confirm('确定删除模型 ' + name + '？')) return;
  deleteSorted(editIdx);
  closeModal();
}

async function checkAllModels() {
  var btn = document.getElementById('check-all-btn');
  btn.textContent = '检测中...';
  btn.disabled = true;

  try {
    var resp = await fetch(API_BASE + '/health-check');

    // Map results back to levels
    var sorted = getSortedLevels();
    for (var i = 0; i < sorted.length; i++) {
      var levelNum = parseInt(sorted[i][0]);
      var check = results[levelNum] || results[String(levelNum)];
      if (check) {
        sorted[i][1]._status = check.status;

  btn.disabled = false;
