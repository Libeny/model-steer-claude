// Move / Delete
// ═══════════════════════════════════════════

function isDefaultLevel(idx) {
  var sorted = getSortedLevels();
  var levelNum = parseInt(sorted[idx][0]);
  return levelNum === (config.default_level || 1);
}

function moveToPool(idx, e) {
  if (e) e.stopPropagation();
  var sorted = getSortedLevels();
  // Guard: can't move default model to pool
  if (isDefaultLevel(idx)) {
    showToast('默认模型不能降级，请先更换默认模型', 'error');
    return;
  }
  // Guard: must keep at least one model in levels
  if (sorted.length <= 1) {
    showToast('至少保留一个模型等级', 'error');
    return;
  }
  var item = sorted[idx][1];
  var remaining = sorted.map(function(e) { return e[1]; });
  remaining.splice(idx, 1);
  rebuildLevels(remaining);
  // Adjust default_level if it shifted
  if (config.default_level > remaining.length) {
    config.default_level = remaining.length;
  }
  if (!config._pool) config._pool = [];
  config._pool.push(item);
  render();
}

function moveToSorted(idx) {
  var pool = config._pool || [];
  var item = pool[idx];
  pool.splice(idx, 1);
  var sorted = getSortedLevels().map(function(e) { return e[1]; });
  sorted.push(item);
  rebuildLevels(sorted);
  render();
}

function deleteSorted(idx, e) {
  if (e) e.stopPropagation();
  var sorted = getSortedLevels();
  // Guard: can't delete default model
  if (isDefaultLevel(idx)) {
    showToast('默认模型不能删除，请先更换默认模型', 'error');
    return;
  }
  // Guard: must keep at least one
  if (sorted.length <= 1) {
    showToast('至少保留一个模型等级', 'error');
    return;
  }
  var name = (sorted[idx][1].name || '?').toUpperCase();
  if (!confirm('确定删除 ' + name + '？')) return;
  var remaining = sorted.map(function(e) { return e[1]; });
  remaining.splice(idx, 1);
  rebuildLevels(remaining);
  if (config.default_level > remaining.length) {
    config.default_level = remaining.length;
  }
  render();
  showToast('已删除 ' + name);
}

function deletePool(idx) {
  var pool = config._pool || [];
  pool.splice(idx, 1);
  render();
}

function confirmDeletePool(idx, e) {
  if (e) e.stopPropagation();
  var pool = config._pool || [];
  if (!pool[idx]) return;
  var name = (pool[idx].name || '?').toUpperCase();
  if (!confirm('确定删除模型 ' + name + '？\n此操作不可撤销。')) return;
  deletePool(idx);
  showToast('已删除 ' + name);
}

function openEditPool(idx, e) {

  // TODO: implement pool item editing (similar to openEdit but for pool items)

  showToast('模型池编辑功能开发中');
}

function undoChanges() {
  if (!configSnapshot) return;
  config = JSON.parse(configSnapshot);
  render();

async function saveConfig() {
  // Validation before save
  var sorted = getSortedLevels();
  if (sorted.length === 0) {
    showToast('至少需要一个模型等级', 'error');
    return;
  }
  var defaultLevel = config.default_level || 1;
  var defaultExists = sorted.some(function(e) { return parseInt(e[0]) === defaultLevel; });
  if (!defaultExists) {
    showToast('默认模型等级 ' + defaultLevel + ' 不存在，请重新设置默认', 'error');
    return;
  }

  // Before saving, ensure providers arrays are normalized in config.levels
  // Read the current DOM state and sync provider order back to config
  sorted.forEach(function(entry, i) {
    var level = entry[1];
    var providers = getLevelProviders(level);
    // Ensure roles are correct: first is primary, rest are backup
    providers.forEach(function(pv, pi) {
      pv.role = pi === 0 ? 'primary' : 'backup';
    });
    level.providers = providers;
    // Remove legacy single-provider field if providers array exists
    if (level.provider && level.providers.length > 0) {
      delete level.provider;
    }
  });

  try {
    var resp = await fetch(API_BASE + '/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config)
    });
    if (resp.ok) {
      configSnapshot = JSON.stringify(config);
      showToast('配置已保存', 'success');
      // Sync CoT session list with new config
      cotMscSessions = {};
      if (cotSelectedProject) cotRefreshSessions();
    } else {
      showToast('保存失败', 'error');
    }
  } catch (e) {
    showToast('保存失败', 'error');
  }
}

function renderUsageBar(prefix, pct, resetIso) {
  if (pct === undefined || pct === null) return;
  var color = pct >= 85 ? '#e74c3c' : pct >= 60 ? '#d97706' : '#2d8a56';
  document.getElementById(prefix + '-pct').textContent = pct + '%';
  document.getElementById(prefix + '-pct').style.color = color;
  var bar = document.getElementById(prefix + '-bar');
  bar.style.width = Math.min(pct, 100) + '%';
  bar.style.background = color;
  var resetEl = document.getElementById(prefix + '-reset');
  if (resetIso && resetEl) {
    try {
      var d = new Date(resetIso);
      var now = new Date();
      var diffSec = (d - now) / 1000;
      if (diffSec <= 0) {
        resetEl.textContent = '即将重置';
      } else if (diffSec < 86400) {
        // <1天：显示具体时间 HH:MM
        var hh = String(d.getHours()).padStart(2, '0');
        var mm = String(d.getMinutes()).padStart(2, '0');
        var diffH = Math.floor(diffSec / 3600);
        var diffM = Math.floor((diffSec % 3600) / 60);
        resetEl.textContent = '重置于 ' + hh + ':' + mm + '（' + diffH + 'h' + diffM + 'm 后）';
      } else {
        var days = Math.floor(diffSec / 86400);
        var hours = Math.floor((diffSec % 86400) / 3600);
        resetEl.textContent = '重置于 ' + days + '天' + hours + '小时后';
      }
    } catch (e) { resetEl.textContent = ''; }
  }
}

function renderModelDistribution(sessions) {
  var el = document.getElementById('model-distribution');
  // Aggregate tokens by each usage record's label (not session's current label)
  var modelTokens = {};
  var totalTokens = 0;
  sessions.forEach(function(s) {
    (s.usage || []).forEach(function(u) {
      var label = u.label || u.provider || 'Unknown';
      var tokens = (u.input_tokens||0) + (u.output_tokens||0) + (u.cache_read_tokens||0);
      modelTokens[label] = (modelTokens[label] || 0) + tokens;
      totalTokens += tokens;
    });
  });

  if (totalTokens === 0) {
    el.innerHTML = '<div style="color:var(--text-tertiary);font-size:13px">暂无用量数据</div>';
    return;
  }

  // Build color map from config levels
  var colors = {};
  if (config && config.levels) {
    Object.values(config.levels).forEach(function(lv) {
      if (lv.name && lv.color) colors[lv.name.toUpperCase()] = lv.color;
    });
  }
  el.innerHTML = Object.entries(modelTokens).sort(function(a,b) { return b[1]-a[1]; }).map(function(e) {
    var label = e[0], tokens = e[1];
    var pct = totalTokens > 0 ? (tokens / totalTokens * 100).toFixed(1) : 0;
    var color = colors[label] || '#888';
    return '<div style="flex:1;min-width:140px">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
        '<div style="width:10px;height:10px;border-radius:50%;background:' + color + '"></div>' +
        '<span style="font-weight:600;font-size:13px">' + escHtml(label) + '</span>' +
        '<span style="color:var(--text-tertiary);font-size:12px">' + pct + '%</span>' +
      '</div>' +
      '<div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:3px;transition:width 0.3s"></div>' +
      '</div>' +
      '<div style="margin-top:4px;font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">' + tokens.toLocaleString() + ' tokens</div>' +
    '</div>';
  }).join('');
}

function renderProjectUsage(sessions, cotData) {
  var el = document.getElementById('project-usage');
  var cotMap = {};
  cotData.forEach(function(c) { cotMap[c.session_id] = c; });

  // Build color map from config
  var levelColors = {};
  if (config && config.levels) {
    Object.values(config.levels).forEach(function(lv) {
      if (lv.name) levelColors[lv.name.toUpperCase()] = lv.color || '#888';
    });
  }

  // Aggregate per project, per model
  var projects = {};
  sessions.forEach(function(s) {
    var cot = cotMap[s.session_id];
    var path = (cot && cot.project_path) ? cot.project_path : s.project_path || '(未知)';
    var short = cotShortPath(path);
    if (!projects[short]) projects[short] = { total: 0, sessions: 0, path: path, models: {}, cost: 0 };
    projects[short].sessions++;
    (s.usage || []).forEach(function(u) {
      var label = u.label || u.provider || 'Unknown';
      var inp = u.input_tokens||0, out = u.output_tokens||0, crd = u.cache_read_tokens||0, ccr = u.cache_create_tokens||0;
      var tokens = inp + out + crd + ccr;
      projects[short].total += tokens;
      projects[short].models[label] = (projects[short].models[label] || 0) + tokens;
      var p = PRICE[u.provider] || PRICE.sonnet;
      projects[short].cost += (inp/1e6)*p.input + (out/1e6)*p.output + (crd/1e6)*(p.cache_read||p.input) + (ccr/1e6)*(p.cache_create||p.input);
    });
  });

  var sorted = Object.entries(projects).sort(function(a,b) { return b[1].total - a[1].total; });
  if (!sorted.length || sorted[0][1].total === 0) {
    el.innerHTML = '<div style="color:var(--text-tertiary);font-size:13px">暂无用量数据</div>';
    return;
  }

  var maxTokens = sorted[0][1].total || 1;
  el.innerHTML = sorted.map(function(e) {
    var name = e[0], info = e[1];
    var barPct = (info.total / maxTokens * 100);

    // Stacked bar segments by model
    var segments = Object.entries(info.models).sort(function(a,b){ return b[1]-a[1]; });
    var barHtml = segments.map(function(seg) {
      var label = seg[0], t = seg[1];
      var w = info.total > 0 ? (t / info.total * barPct).toFixed(1) : 0;
      var color = levelColors[label] || '#888';
      return '<div style="height:100%;width:' + w + '%;background:' + color + '" title="' + escHtml(label) + ' ' + t.toLocaleString() + '"></div>';
    }).join('');

    return '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">' +
      '<div style="width:130px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + escHtml(info.path) + '">' + escHtml(name) + '</div>' +
      '<div style="flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;display:flex">' +
        barHtml +
      '</div>' +
      '<div style="width:80px;text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)">' + fmtMoney(info.cost) + '</div>' +
      '<div style="width:50px;text-align:right;font-size:11px;color:var(--text-tertiary)">' + info.sessions + ' 会话</div>' +
    '</div>';
  }).join('');
}

          `<span style="font-weight:500">${name}</span>` +
          `<span style="color:var(--text-tertiary);flex:1;text-align:right">${s.reason}</span>` +
          `</div>`
        ).join('');
    }

    // Render fallback log
    const logEl = document.getElementById('fallback-log');
    if (!log.length) {
      logEl.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary)">暂无 fallback 事件</div>';
      return;
    }
    logEl.innerHTML = log.map(e => {
      const time = e.timestamp ? e.timestamp.replace('T', ' ').slice(0, 19) : '';
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px">` +
        `<span style="color:var(--text-tertiary);white-space:nowrap;font-family:var(--font-mono);min-width:130px">${time}</span>` +
        `<span style="font-weight:500;white-space:nowrap">${e.from_label || 'L' + e.from_level}</span>` +
        `<span style="color:var(--text-tertiary)">→</span>` +
        `<span style="font-weight:600;color:var(--accent);white-space:nowrap">${e.to_label || 'L' + e.to_level}</span>` +
        `<span style="color:var(--text-tertiary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(e.reason || '').replace(/"/g, '&quot;')}">${e.reason || ''}</span>` +
        `</div>`;
    }).join('');
  } catch (err) {
    console.error('Failed to load fallback log:', err);
  }
}

function toggleDetail(id) {
  var el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function renderStats(sessions) {
  var totals = { input: 0, output: 0, cache_read: 0, cache_create: 0 };
  var costs = { input: 0, output: 0, cache_read: 0, cache_create: 0 };
  // Savings: only count non-Anthropic tokens (the ones we replaced with cheaper models)
  var savedSonnetCost = 0; // what those tokens would cost on Sonnet
  var savedActualCost = 0; // what they actually cost on the cheap model

  sessions.forEach(function(s) {
    (s.usage || []).forEach(function(u) {
      var inp = u.input_tokens || 0;
      var out = u.output_tokens || 0;
      var cr = u.cache_read_tokens || 0;
      var cc = u.cache_create_tokens || 0;

      totals.input += inp;
      totals.output += out;
      totals.cache_read += cr;
      totals.cache_create += cc;

      var p = PRICE[u.provider] || PRICE.sonnet;
      costs.input += (inp / 1e6) * p.input;
      costs.output += (out / 1e6) * p.output;
      costs.cache_read += (cr / 1e6) * (p.cache_read || p.input);
      costs.cache_create += (cc / 1e6) * (p.cache_create || p.input);

      // Non-Anthropic tokens: calculate savings vs Sonnet
      if (u.provider !== 'anthropic') {
        var fp = PRICE.sonnet;
        savedSonnetCost += (inp / 1e6) * fp.input + (out / 1e6) * fp.output
          + (cr / 1e6) * fp.cache_read + (cc / 1e6) * fp.cache_create;
        savedActualCost += (inp / 1e6) * p.input + (out / 1e6) * p.output
          + (cr / 1e6) * (p.cache_read || p.input) + (cc / 1e6) * (p.cache_create || p.input);
      }
    });
  });

  var totalTokens = totals.input + totals.output + totals.cache_read + totals.cache_create;
  var mixedCost = costs.input + costs.output + costs.cache_read + costs.cache_create;

  document.getElementById('stat-tokens').textContent = totalTokens.toLocaleString();
  document.getElementById('stat-cost').textContent = fmtMoney(mixedCost);

  // Token breakdown detail
  var tokenRows = [
    { label: 'Input',        val: totals.input },
    { label: 'Output',       val: totals.output },
    { label: 'Cache Read',   val: totals.cache_read },
    { label: 'Cache Create', val: totals.cache_create }
  ];
  document.getElementById('token-detail').innerHTML = tokenRows.map(function(r) {
    return '<div style="display:flex;justify-content:space-between;padding:2px 0;color:var(--text-secondary)">' +
      '<span>' + r.label + '</span>' +
      '<span style="font-family:var(--font-mono)">' + r.val.toLocaleString() + '</span></div>';
  }).join('');

  // Cost breakdown detail
  var costRows = [
    { label: 'Input',        val: costs.input },
    { label: 'Output',       val: costs.output },
    { label: 'Cache Read',   val: costs.cache_read },
    { label: 'Cache Create', val: costs.cache_create }
  ];
  document.getElementById('cost-detail').innerHTML = costRows.map(function(r) {
    return '<div style="display:flex;justify-content:space-between;padding:2px 0;color:var(--text-secondary)">' +
      '<span>' + r.label + '</span>' +
      '<span style="font-family:var(--font-mono)">' + fmtMoneyDetail(r.val) + '</span></div>';
  }).join('');

  // Saved = Sonnet equivalent cost of non-Claude tokens - actual cheap model cost
  // Saved = Sonnet equivalent of non-Claude tokens - their actual cost
  // Percentage = saved / sonnet equivalent (how much cheaper vs Sonnet for those tokens)
  var saved = savedSonnetCost - savedActualCost;
  var pct = savedSonnetCost > 0 ? Math.round((saved / savedSonnetCost) * 100) : 0;
  document.getElementById('stat-saved').textContent =
    saved > 0 ? fmtMoney(saved) + ' (-' + pct + '%)' : fmtMoney(0);
  document.getElementById('stat-saved-label').innerHTML =
    '已为您节省 <span style="font-size:10px;opacity:0.5">\u25be</span>';

  // Savings breakdown detail
  var detailRows = [
    { label: '若全走 Sonnet', val: savedSonnetCost, color: 'var(--text-secondary)' },
    { label: '实际花费（替代模型）', val: savedActualCost, color: 'var(--text-secondary)' },
    { label: '节省', val: saved, color: '#2d8a56' }
  ];
  document.getElementById('saved-detail').innerHTML = detailRows.map(function(r) {
    return '<div style="display:flex;justify-content:space-between;padding:2px 0;color:' + r.color + '">' +
      '<span>' + r.label + '</span>' +
      '<span style="font-family:var(--font-mono)">' + fmtMoney(r.val) + '</span></div>';
  }).join('') +
  '<div style="margin-top:6px;font-size:11px;color:var(--text-tertiary)">相较将替代模型的请求全部使用 Sonnet</div>';
}

function showToast(message, type) {
  type = type || 'success';
  var el = document.getElementById('toast');
  el.textContent = message;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() {
    el.classList.remove('show');
  }, 2000);
}

// Start
// ═══════════════════════════════════════════

init();

// Auto-refresh session management tab every 5 seconds
setInterval(function() {
  if (document.getElementById('tab-usage').classList.contains('active')) {
    loadSessionManagement();

}, 5000);

// ═══════════════════════════════════════════
// CoT Viewer — Two Column + Fullscreen
// ═══════════════════════════════════════════

var cotProjects = [];
var cotFilteredProjects = [];
var cotSelectedProject = null;
var cotSessions = [];
var cotFilteredSessions = [];
var cotSelectedSessionId = null;
var cotProjectSearchTimer = null;
var cotSessionSearchTimer = null;
var cotMscSessions = {}; // session_id → {level, name, label}

function cotProjectSearchDebounced() {
  clearTimeout(cotProjectSearchTimer);
  cotProjectSearchTimer = setTimeout(function() {
    cotFilterProjects();
  }, 200);
}

function cotSessionSearchDebounced() {
  clearTimeout(cotSessionSearchTimer);
  cotSessionSearchTimer = setTimeout(function() {
    cotFilterSessions();
  }, 200);
}

// 1. Load projects on tab switch
async function loadCotProjects() {

  try {
    var resp = await fetch(API_BASE + '/api/cot/projects');
    cotProjects = await resp.json();
    cotFilterProjects();
  } catch (e) {
    document.getElementById('cot-project-list').innerHTML =
      '<div class="empty-state" style="padding:20px 12px">加载失败</div>';
  }
}

function cotFilterProjects() {
  var q = (document.getElementById('cot-project-search').value || '').trim().toLowerCase();
  if (q) {
    cotFilteredProjects = cotProjects.filter(function(p) {
      return p.path.toLowerCase().indexOf(q) >= 0 || p.dir_name.toLowerCase().indexOf(q) >= 0;
    });
  } else {
    cotFilteredProjects = cotProjects;
  }
  renderCotProjects();
}

function cotShortPath(fullPath) {
  // ~/work/model/steer/claude → claude
  // ~/Library/Application/Support/CodexBar/ClaudeProbe → ClaudeProbe
  // ~ → ~ (home)
  if (!fullPath || fullPath === '~' || fullPath === '/') return '~';
  var parts = fullPath.replace(/\/+$/, '').split('/');
  return parts[parts.length - 1] || fullPath;
}

function cotPathDepth(fullPath) {
  if (!fullPath || fullPath === '~') return 0;
  return (fullPath.match(/\//g) || []).length;
}

function renderCotProjects() {
  var el = document.getElementById('cot-project-list');
  if (!cotFilteredProjects.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px 12px">无项目目录</div>';
    return;
  }

  el.innerHTML = cotFilteredProjects.map(function(p) {
    var isActive = p.dir_name === cotSelectedProject;
    var shortName = cotShortPath(p.path);
    var depth = Math.min(cotPathDepth(p.path), 3);
    var indent = depth > 0 ? (depth * 12) : 0;
    var icon = depth === 0 ? '🏠' : '📂';
    return '<div class="cot-project-item' + (isActive ? ' active' : '') + '"' +
      ' onclick="cotSelectProject(\'' + escHtml(p.dir_name) + '\')"' +
      ' title="' + escHtml(p.path) + '"' +
      ' style="padding-left:' + (12 + indent) + 'px">' +
      '<span style="margin-right:6px;font-size:13px">' + icon + '</span>' +
      '<span class="cot-project-path">' + escHtml(shortName) + '</span>' +
      '<span class="cot-project-count">' + p.session_count + '</span>' +
    '</div>';
  }).join('');
}

// 2. On project click
async function cotSelectProject(dirName) {
  cotSelectedProject = dirName;
  cotSelectedSessionId = null;
  try { localStorage.setItem('msc-cot-project', dirName); } catch(e) {}
  renderCotProjects();

  // Clear session search
  document.getElementById('cot-session-search').value = '';

  var listEl = document.getElementById('cot-session-list');
  listEl.innerHTML = '<div class="empty-state" style="padding:20px 12px">加载中...</div>';

  try {
    var [cotResp, mscResp] = await Promise.all([
      fetch(API_BASE + '/api/cot/sessions?project=' + encodeURIComponent(dirName)),
      fetch(API_BASE + '/sessions')
    ]);
    cotSessions = await cotResp.json();
    var mscData = await mscResp.json();
    cotMscSessions = {};
    mscData.forEach(function(s) { cotMscSessions[s.session_id] = s; });
    cotFilteredSessions = cotSessions;
    renderCotSessions();
  } catch (e) {
    listEl.innerHTML = '<div class="empty-state" style="padding:20px 12px">加载失败</div>';
  }
}

function cotFilterSessions() {
  var q = (document.getElementById('cot-session-search').value || '').trim().toLowerCase();
  if (q) {
    cotFilteredSessions = cotSessions.filter(function(s) {
      return (s.first_query || '').toLowerCase().indexOf(q) >= 0 ||
             s.session_id.toLowerCase().indexOf(q) >= 0;
    });
  } else {
    cotFilteredSessions = cotSessions;
  }
  renderCotSessions();
}

function renderCotSessions() {
  var el = document.getElementById('cot-session-list');
  if (!cotFilteredSessions.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px 12px">暂无会话</div>';
    return;
  }

  el.innerHTML = cotFilteredSessions.map(function(s) {
    var isActive = s.session_id === cotSelectedSessionId;
    var query = s.first_query || s.session_id.substring(0, 12);
    var timeStr = cotRelativeTime(s.last_timestamp);
    var sizeStr = cotFormatSize(s.file_size || 0);
    var msc = cotMscSessions[s.session_id];
    var modelLabel = msc ? msc.label : '';
    var sid = escHtml(s.session_id);
    var safeQuery = escHtml(query).replace(/'/g, "\\'");

    var badgeHtml = modelLabel
      ? '<span class="model-tag" style="font-size:10px;cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();cotShowSwitchPopover(this,\'' + sid + '\')" title="点击切换模型">' + escHtml(modelLabel) + '</span>'
      : '';

    return '<div class="cot-session-item' + (isActive ? ' active' : '') + '" style="position:relative"' +
      ' onclick="cotSelectSession(\'' + sid + '\',\'' + safeQuery + '\')">' +
      '<div style="display:flex;align-items:center;gap:6px">' +
        '<div class="cot-session-query" style="flex:1">' + escHtml(query) + '</div>' +
        badgeHtml +
      '</div>' +
      '<div class="cot-session-meta">' +
        '<span class="cot-session-time">' + escHtml(timeStr) + '</span>' +
        '<span class="cot-session-size">' + escHtml(sizeStr) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── Model switch popover ──

var cotSwitchTarget = null; // {sessionId, selectedLevel}

function cotShowSwitchPopover(anchor, sessionId) {
  cotCloseSwitchPopover();
  var levels = getSortedLevels();
  var msc = cotMscSessions[sessionId];
  var currentLevel = msc ? String(msc.level) : '';
  cotSwitchTarget = { sessionId: sessionId, selectedLevel: currentLevel };

  function buildPopover() {
    var opts = levels.map(function(lv) {
      var isCurrent = lv[0] === currentLevel;
      var isSelected = lv[0] === cotSwitchTarget.selectedLevel;
      var label = (lv[1].name || '').toUpperCase();
      var color = lv[1].color || '#888';
      return '<div class="model-switch-option' + (isSelected ? ' active' : '') + '" onclick="cotSwitchSelect(\'' + lv[0] + '\')">' +
        '<span class="dot" style="background:' + color + '"></span>' +
        '<span>' + escHtml(label) + '</span>' +
        (isCurrent ? '<span style="margin-left:auto;font-size:11px;color:var(--text-tertiary)">当前</span>' : '') +
      '</div>';
    }).join('');

    var changed = cotSwitchTarget.selectedLevel !== currentLevel;
    var footer = '<div style="display:flex;gap:8px;justify-content:flex-end;padding:8px 6px 4px;border-top:1px solid var(--border);margin-top:4px">' +
      '<button onclick="cotCloseSwitchPopover()" style="padding:4px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-secondary);cursor:pointer;font-size:12px;font-family:var(--font-sans)">取消</button>' +
      '<button onclick="cotDoSwitch()" style="padding:4px 14px;border:1px solid var(--accent);border-radius:6px;background:' + (changed ? 'var(--accent)' : 'var(--accent-light)') + ';color:' + (changed ? '#fff' : 'var(--accent)') + ';cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font-sans);opacity:' + (changed ? '1' : '0.5') + '"' + (changed ? '' : ' disabled') + '>确认</button>' +
    '</div>';

    return opts + footer;
  }

  var backdrop = document.createElement('div');
  backdrop.className = 'model-switch-backdrop';
  backdrop.onclick = cotCloseSwitchPopover;
  backdrop.id = 'model-switch-backdrop';
  document.body.appendChild(backdrop);

  var popover = document.createElement('div');
  popover.className = 'model-switch-popover';
  popover.id = 'model-switch-popover';
  popover.innerHTML = buildPopover();

  var rect = anchor.getBoundingClientRect();
  popover.style.position = 'fixed';
  popover.style.right = (window.innerWidth - rect.right) + 'px';
  popover.style.top = (rect.bottom + 4) + 'px';
  document.body.appendChild(popover);
}

function cotSwitchSelect(level) {
  if (!cotSwitchTarget) return;
  cotSwitchTarget.selectedLevel = level;
  // Re-render popover content
  var popover = document.getElementById('model-switch-popover');
  if (!popover) return;
  var anchor = popover; // reuse position
  var levels = getSortedLevels();
  var msc = cotMscSessions[cotSwitchTarget.sessionId];
  var currentLevel = msc ? String(msc.level) : '';

  var opts = levels.map(function(lv) {
    var isCurrent = lv[0] === currentLevel;
    var isSelected = lv[0] === cotSwitchTarget.selectedLevel;
    var label = (lv[1].name || '').toUpperCase();
    var color = lv[1].color || '#888';
    return '<div class="model-switch-option' + (isSelected ? ' active' : '') + '" onclick="cotSwitchSelect(\'' + lv[0] + '\')">' +
      '<span class="dot" style="background:' + color + '"></span>' +
      '<span>' + escHtml(label) + '</span>' +
      (isCurrent ? '<span style="margin-left:auto;font-size:11px;color:var(--text-tertiary)">当前</span>' : '') +
    '</div>';
  }).join('');

  var changed = cotSwitchTarget.selectedLevel !== currentLevel;
  var footer = '<div style="display:flex;gap:8px;justify-content:flex-end;padding:8px 6px 4px;border-top:1px solid var(--border);margin-top:4px">' +
    '<button onclick="cotCloseSwitchPopover()" style="padding:4px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-secondary);cursor:pointer;font-size:12px;font-family:var(--font-sans)">取消</button>' +
    '<button onclick="cotDoSwitch()" style="padding:4px 14px;border:1px solid var(--accent);border-radius:6px;background:' + (changed ? 'var(--accent)' : 'var(--accent-light)') + ';color:' + (changed ? '#fff' : 'var(--accent)') + ';cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font-sans);opacity:' + (changed ? '1' : '0.5') + '"' + (changed ? '' : ' disabled') + '>确认</button>' +
  '</div>';

  popover.innerHTML = opts + footer;
}

function cotCloseSwitchPopover() {
  cotSwitchTarget = null;
  var b = document.getElementById('model-switch-backdrop');
  var p = document.getElementById('model-switch-popover');
  if (b) b.remove();
  if (p) p.remove();
}

async function cotDoSwitch() {
  if (!cotSwitchTarget) return;
  var sid = cotSwitchTarget.sessionId;
  var level = cotSwitchTarget.selectedLevel;
  cotCloseSwitchPopover();
  try {
    await fetch(API_BASE + '/think-level?session=' + encodeURIComponent(sid) + '&level=' + level);
    var mscResp = await fetch(API_BASE + '/sessions');
    var mscData = await mscResp.json();
    cotMscSessions = {};
    mscData.forEach(function(s) { cotMscSessions[s.session_id] = s; });
    showToast('已切换');
  } catch(e) {
    showToast('切换失败', 'error');
  }
  renderCotSessions();
  cotViewerUpdateModel();
}

// 3. On session click — open CUI viewer
function cotSelectSession(sessionId, title) {
  cotSelectedSessionId = sessionId;
  renderCotSessions();

  document.getElementById('cot-list-view').style.display = 'none';
  document.getElementById('cot-viewer-view').style.display = 'flex';
  document.getElementById('cot-cui-frame').src = '/cot/c/' + encodeURIComponent(sessionId) + '?embed&skip-auth';

  // Show model badge in viewer
  cotViewerUpdateModel();
}

function cotViewerUpdateModel() {
  var msc = cotMscSessions[cotSelectedSessionId];
  var badge = document.getElementById('cot-viewer-model-badge');
  if (msc && msc.label) {
    badge.textContent = msc.label;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
  document.getElementById('cot-viewer-switch').style.display = 'none';
}


// Back from viewer — return to two-column list view
function cotGoBack() {
  document.getElementById('cot-viewer-view').style.display = 'none';
  document.getElementById('cot-list-view').style.display = 'block';
  document.getElementById('cot-cui-frame').src = '';
  cotSelectedSessionId = null;
  renderCotSessions();
}

// Listen for CUI back button postMessage
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'cot-go-back') {
    cotGoBack();
  }
});

// Manual refresh sessions
async function cotRefreshSessions() {
  if (!cotSelectedProject) return;
  var btn = document.getElementById('cot-refresh-btn');
  if (btn) { btn.style.animation = 'spin 0.6s linear'; }
  try {
    var resp = await fetch(API_BASE + '/api/cot/sessions?project=' + encodeURIComponent(cotSelectedProject));
    cotSessions = await resp.json();
    cotFilterSessions();
  } catch (e) {}
  if (btn) { setTimeout(function() { btn.style.animation = ''; }, 600); }
}

function cotRelativeTime(ts) {
  if (!ts) return '';
  try {
    var d = new Date(ts);
    var now = new Date();
    var diff = (now - d) / 1000;
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 604800) return Math.floor(diff / 86400) + '天前';
    return d.toLocaleDateString('zh-CN');
  } catch (e) {
    return ts.substring(0, 10);
  }
}

function cotFormatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / 1024 / 1024).toFixed(1) + 'MB';
}

// Auto-refresh session list every 60 seconds (if a project is selected)
setInterval(function() {
  if (document.getElementById('tab-cot').classList.contains('active') && cotSelectedProject && !cotSelectedSessionId) {
    cotRefreshSessions();
  }
}, 60000);
